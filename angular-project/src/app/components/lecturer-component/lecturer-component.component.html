        <h3>➕ הוספת מרצה חדש</h3>
<form (ngSubmit)="addLecturer()" style="margin-bottom: 1em;">
  <label>
    שם:
    <input [(ngModel)]="newLecturer.lecturerName" name="name" required />
  </label>
  <button type="submit">💾 הוסף מרצה</button>
</form>

<h2>📚 רשימת מרצים</h2>

<ul>
  <li *ngFor="let lecturer of lecturers">
    <ng-container *ngIf="editMode !== lecturer.lecturerId; else editForm">
      <strong>{{ lecturer.lecturerName }}</strong> | מזהה: {{ lecturer.lecturerId }}
      <button (click)="startEdit(lecturer)">✏️ ערוך</button>
      <button (click)="deleteLecturer(lecturer.lecturerId!)">🗑️ מחק</button>
      <br />
      📝 שיעורים:
      <span *ngIf="lecturer.lecturerLessons?.length; else noLessons">
        <ul>
          <li *ngFor="let lesson of lecturer.lecturerLessons">
            {{ lesson.lessonName }}
          </li>
        </ul>
      </span>
      <ng-template #noLessons>אין שיעורים</ng-template>
    </ng-container>

    <ng-template #editForm>
      <form (ngSubmit)="saveEdit(lecturer.lecturerId!)">
        <input [(ngModel)]="editLecturer.lecturerName" name="editName{{lecturer.lecturerId}}" required />
        <button type="submit">💾 שמור</button>
        <button type="button" (click)="cancelEdit()">❌ ביטול</button>
      </form>
    </ng-template>
  </li>
</ul>
